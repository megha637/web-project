<!DOCTYPE html>
<html>
<head>
    <title>AI Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin-top: 20px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: white;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .cell:hover {
            background: #ddd;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
        }
    </style>
</head>

<body>

<h1>AI Tic Tac Toe 🤖</h1>
<h2 id="status">Your Turn (X)</h2>

<div class="board" id="board"></div>
<button onclick="resetGame()">Restart</button>

<script>
let board = ["", "", "", "", "", "", "", "", ""];
let human = "X";
let ai = "O";
let gameActive = true;

const statusText = document.getElementById("status");
const boardDiv = document.getElementById("board");

function createBoard() {
    boardDiv.innerHTML = "";
    board.forEach((cell, index) => {
        const div = document.createElement("div");
        div.classList.add("cell");
        div.innerText = cell;
        div.addEventListener("click", () => humanMove(index));
        boardDiv.appendChild(div);
    });
}

function humanMove(index) {
    if (board[index] !== "" || !gameActive) return;

    board[index] = human;
    createBoard();

    if (checkWinner(board, human)) {
        statusText.innerText = "You Win 🎉";
        gameActive = false;
        return;
    }

    if (isDraw()) {
        statusText.innerText = "Draw!";
        return;
    }

    statusText.innerText = "AI Thinking...";
    setTimeout(aiMove, 500);
}

function aiMove() {
    let bestMove = minimax(board, ai).index;
    board[bestMove] = ai;
    createBoard();

    if (checkWinner(board, ai)) {
        statusText.innerText = "AI Wins 🤖";
        gameActive = false;
        return;
    }

    if (isDraw()) {
        statusText.innerText = "Draw!";
        return;
    }

    statusText.innerText = "Your Turn (X)";
}

function minimax(newBoard, player) {
    let availSpots = newBoard.map((v, i) => v === "" ? i : null).filter(v => v !== null);

    if (checkWinner(newBoard, human)) return { score: -10 };
    if (checkWinner(newBoard, ai)) return { score: 10 };
    if (availSpots.length === 0) return { score: 0 };

    let moves = [];

    for (let i = 0; i < availSpots.length; i++) {
        let move = {};
        move.index = availSpots[i];
        newBoard[availSpots[i]] = player;

        let result;
        if (player === ai) {
            result = minimax(newBoard, human);
            move.score = result.score;
        } else {
            result = minimax(newBoard, ai);
            move.score = result.score;
        }

        newBoard[availSpots[i]] = "";
        moves.push(move);
    }

    let bestMove;
    if (player === ai) {
        let bestScore = -Infinity;
        moves.forEach((m, i) => {
            if (m.score > bestScore) {
                bestScore = m.score;
                bestMove = i;
            }
        });
    } else {
        let bestScore = Infinity;
        moves.forEach((m, i) => {
            if (m.score < bestScore) {
                bestScore = m.score;
                bestMove = i;
            }
        });
    }

    return moves[bestMove];
}

function checkWinner(b, player) {
    const winPatterns = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    return winPatterns.some(pattern =>
        pattern.every(i => b[i] === player)
    );
}

function isDraw() {
    return board.every(cell => cell !== "");
}

function resetGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    gameActive = true;
    statusText.innerText = "Your Turn (X)";
    createBoard();
}

createBoard();
</script>

</body>
</html>
